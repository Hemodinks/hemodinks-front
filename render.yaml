services:
  - type: web
    name: hemodinks-front
    runtime: static
    repo: https://github.com/Hemodinks/hemodinks-front
    branch: main
    buildCommand: npm ci && npm run build && npm run budget
    staticPublishPath: ./dist
    autoDeployTrigger: checksPass
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: VITE_API_URL
        sync: false
      - key: VITE_APP_ENV
        value: production
      - key: VITE_APP_VERSION
        sync: false
      - key: VITE_SENTRY_DSN
        sync: false
      - key: VITE_SENTRY_TRACES_SAMPLE_RATE
        value: "0"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: sameorigin
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
