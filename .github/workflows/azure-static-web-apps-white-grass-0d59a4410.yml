name: Deploy Azure Static Web Apps

"on":
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

env:
  NPM_CONFIG_AUDIT: false
  NPM_CONFIG_FUND: false
  NPM_CONFIG_FETCH_RETRIES: 5
  NPM_CONFIG_FETCH_RETRY_FACTOR: 2
  NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: 10000
  NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: 120000

concurrency:
  group: azure-static-web-apps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    name: Build and deploy
    runs-on: ubuntu-latest
    env:
      AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_GRASS_0D59A4410 }}
      VITE_API_URL: ${{ secrets.VITE_API_URL }}
      VITE_APP_ENV: production
      VITE_APP_VERSION: ${{ github.sha }}
      VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
      VITE_SENTRY_TRACES_SAMPLE_RATE: ${{ vars.VITE_SENTRY_TRACES_SAMPLE_RATE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check deployment inputs
        shell: bash
        run: |
          missing=()
          [ -n "$AZURE_STATIC_WEB_APPS_API_TOKEN" ] || missing+=("AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_GRASS_0D59A4410")
          [ -n "$VITE_API_URL" ] || missing+=("VITE_API_URL")

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required GitHub secrets: ${missing[*]}"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if npm ci; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "::error::npm ci failed after ${attempt} attempts."
              exit 1
            fi

            echo "::warning::npm ci failed on attempt ${attempt}. Retrying in 15 seconds..."
            sleep 15
          done

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Check bundle budget
        run: npm run budget

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist
          api_location: ""
          skip_app_build: true

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    name: Close pull request preview
    runs-on: ubuntu-latest
    env:
      AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_GRASS_0D59A4410 }}

    steps:
      - name: Close pull request preview
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
