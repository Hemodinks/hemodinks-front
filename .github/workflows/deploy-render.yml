name: Deploy Render

"on":
  workflow_dispatch: {}

permissions:
  contents: read
  deployments: write

env:
  NPM_CONFIG_AUDIT: false
  NPM_CONFIG_FUND: false
  NPM_CONFIG_FETCH_RETRIES: 5
  NPM_CONFIG_FETCH_RETRY_FACTOR: 2
  NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: 10000
  NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: 120000

concurrency:
  group: render-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Trigger Render deploy hook
    runs-on: ubuntu-latest
    environment:
      name: render-production
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      VITE_API_URL: ${{ secrets.VITE_API_URL }}
      VITE_APP_ENV: production
      VITE_APP_VERSION: ${{ github.sha }}
      VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
      VITE_SENTRY_TRACES_SAMPLE_RATE: ${{ vars.VITE_SENTRY_TRACES_SAMPLE_RATE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if npm ci; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "::error::npm ci failed after ${attempt} attempts."
              exit 1
            fi

            echo "::warning::npm ci failed on attempt ${attempt}. Retrying in 15 seconds..."
            sleep 15
          done

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Check bundle budget
        run: npm run budget

      - name: Trigger Render deploy
        shell: bash
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::notice::Skipping Render deploy. Missing secret: RENDER_DEPLOY_HOOK_URL"
            exit 0
          fi

          curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_URL"
