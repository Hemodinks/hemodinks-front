name: CI

"on":
  push:
    branches:
      - main
      - developer
      - dev-local
  pull_request:
    branches:
      - main
      - developer
      - dev-local
  workflow_dispatch: {}

permissions:
  contents: read

env:
  NPM_CONFIG_AUDIT: false
  NPM_CONFIG_FUND: false
  NPM_CONFIG_FETCH_RETRIES: 5
  NPM_CONFIG_FETCH_RETRY_FACTOR: 2
  NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: 10000
  NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: 120000

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test and build
    runs-on: ubuntu-latest
    env:
      VITE_APP_ENV: ci
      VITE_APP_VERSION: ${{ github.sha }}
      VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
      VITE_SENTRY_TRACES_SAMPLE_RATE: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if npm ci; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "::error::npm ci failed after ${attempt} attempts."
              exit 1
            fi

            echo "::warning::npm ci failed on attempt ${attempt}. Retrying in 15 seconds..."
            sleep 15
          done

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Check bundle budget
        run: npm run budget

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Run Lighthouse audit
        run: npm run audit:lighthouse

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: hemodinks-front-dist
          path: dist
          if-no-files-found: error

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-report
          path: reports/lighthouse
          if-no-files-found: ignore
