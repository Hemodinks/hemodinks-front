services:
  - type: web
    name: hemodinks-front-confirmation
    runtime: static
    repo: https://github.com/Hemodinks/hemodinks-front
    branch: developer
    buildCommand: npm ci && npm run build && npm run budget
    staticPublishPath: ./dist
    autoDeployTrigger: checksPass
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: VITE_API_URL
        value: https://hemodinks-api-confirmation.onrender.com
      - key: VITE_APP_ENV
        value: confirmation
      - key: VITE_APP_VERSION
        sync: false
      - key: VITE_CLINICA_ID
        sync: false
      - key: VITE_CLINICA_SLUG
        sync: false
      - key: VITE_NEW_RELIC_ACCOUNT_ID
        sync: false
      - key: VITE_NEW_RELIC_AGENT_ID
        sync: false
      - key: VITE_NEW_RELIC_APPLICATION_ID
        sync: false
      - key: VITE_NEW_RELIC_LICENSE_KEY
        sync: false
      - key: VITE_NEW_RELIC_TRUST_KEY
        sync: false
      - key: VITE_SENTRY_DSN
        sync: false
      - key: VITE_SENTRY_TRACES_SAMPLE_RATE
        value: "0"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: sameorigin
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
